name: Build And Deploy Docker

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: get-mail-oauth2
  CONTAINER_NAME: get-mail-oauth2
  APP_PORT: "8000"

jobs:
  build-transfer-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build Docker image from Dockerfile
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Export image to tar.gz
        run: |
          docker save $IMAGE_NAME:${{ github.sha }} | gzip > image.tar.gz

      - name: Copy image archive to SSH server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: image.tar.gz
          target: /tmp

      - name: SSH deploy (push registry -> pull -> run)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: IMAGE_NAME,CONTAINER_NAME,APP_PORT
          script: |
            set -e

            IMAGE_SHA_TAG="${{ github.sha }}"
            REGISTRY_IMAGE="${{ secrets.REMOTE_REGISTRY_HOST }}/$IMAGE_NAME:$IMAGE_SHA_TAG"
            REGISTRY_USER="${{ secrets.REMOTE_REGISTRY_USER }}"
            REGISTRY_PASSWORD="${{ secrets.REMOTE_REGISTRY_PASSWORD }}"
            SUDO_PASSWORD="${{ secrets.SUDO_PASSWORD }}"

            USE_SUDO=0
            if ! docker info >/dev/null 2>&1; then
              USE_SUDO=1
            fi

            run_docker() {
              if [ "$USE_SUDO" -eq 0 ]; then
                docker "$@"
              else
                if ! command -v sudo >/dev/null 2>&1; then
                  echo "docker requires sudo but sudo is not installed."
                  exit 1
                fi

                if [ -n "$SUDO_PASSWORD" ]; then
                  printf '%s\n' "$SUDO_PASSWORD" | sudo -S docker "$@"
                else
                  sudo docker "$@"
                fi
              fi
            }

            # b2: SSH vao server (step nay dang duoc thuc hien trong action)
            # Load image da build tu runner vao Docker tren server
            gunzip -c /tmp/image.tar.gz | run_docker load

            # b3: Push image len registry host o server SSH
            run_docker tag $IMAGE_NAME:$IMAGE_SHA_TAG $REGISTRY_IMAGE
            if [ -n "$REGISTRY_USER" ] && [ -n "$REGISTRY_PASSWORD" ]; then
              echo "$REGISTRY_PASSWORD" | run_docker login ${{ secrets.REMOTE_REGISTRY_HOST }} -u "$REGISTRY_USER" --password-stdin
            else
              echo "Registry login skipped (no REMOTE_REGISTRY_USER/PASSWORD provided)."
            fi
            run_docker push $REGISTRY_IMAGE

            # b4: Pull image ve trong SSH server
            run_docker pull $REGISTRY_IMAGE

            # b5: Chay image
            run_docker rm -f $CONTAINER_NAME || true
            run_docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              -p $APP_PORT:$APP_PORT \
              -e PORT=$APP_PORT \
              $REGISTRY_IMAGE

            rm -f /tmp/image.tar.gz
